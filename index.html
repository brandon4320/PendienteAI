<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#111827">
<title>PendienteAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700;800&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700;800&display=swap"></noscript>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f7fa;--card:#fff;--card2:#f8f9fb;
  --border:#e8eaed;
  --text:#111827;--muted:#6b7280;--muted2:#9ca3af;
  --green:#16a34a;--green-bg:#f0fdf4;--green-b:#bbf7d0;
  --red:#dc2626;--red-bg:#fef2f2;--red-b:#fecaca;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-b:#fde68a;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-b:#bfdbfe;
  --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-b:#ddd6fe;
  --orange:#ea580c;--orange-bg:#fff7ed;--orange-b:#fed7aa;
  --sky:#0284c7;--sky-bg:#f0f9ff;--sky-b:#bae6fd;
  --yellow:#ca8a04;--yellow-bg:#fefce8;--yellow-b:#fef08a;
  --pink:#db2777;--pink-bg:#fdf2f8;--pink-b:#fbcfe8;
  --font:'Inter',sans-serif;--mono:'DM Mono',monospace;
  --p1:#dc2626;--p1-bg:#fef2f2;--p1-b:#fecaca;
  --p2:#d97706;--p2-bg:#fffbeb;--p2-b:#fde68a;
  --p3:#2563eb;--p3-bg:#eff6ff;--p3-b:#bfdbfe;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;overflow:hidden}
.app{width:100%;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* LOGIN */
.login-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:500;padding:24px}
.login-box{background:var(--card);border-radius:16px;padding:28px;width:100%;max-width:340px;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
.login-title{font-size:22px;font-weight:800;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.login-err{color:var(--red);font-size:12px;margin-top:10px;text-align:center;min-height:16px}

/* HEADER */
.hdr{padding:max(env(safe-area-inset-top),14px) 16px 0;flex-shrink:0;background:var(--card);border-bottom:1px solid var(--border)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px}
.logo{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.logo span{color:var(--green)}
.badge{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:var(--bg);border:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--muted)}
.hdr-gear{background:transparent;border:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;padding:6px;min-height:36px;min-width:36px;justify-content:center;border-radius:9px}
.hdr-icon.on{color:var(--purple);background:var(--purple-bg)}
.hdr-badge{position:absolute;top:0;right:0;min-width:16px;height:16px;border-radius:8px;background:var(--purple);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;font-size:14px;font-weight:600;color:var(--text)}
.set-row input[type=checkbox]{width:20px;height:20px;accent-color:var(--green)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:breathe 2s infinite}
.dot.off{background:var(--red);animation:none}
@keyframes breathe{0%,100%{opacity:1}50%{opacity:0.5}}

/* BANDEJAS */
.btabs{display:flex;border-bottom:1px solid var(--border)}
.bt{flex:1;padding:8px 4px;text-align:center;cursor:pointer;font-size:11px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;background:transparent;border-top:none;border-left:none;border-right:none;transition:all 0.15s}
.bt.active{color:var(--text);border-bottom-color:var(--green)}
.bt.active.sin{border-bottom-color:var(--purple)}
.bt.active.mio{border-bottom-color:var(--orange)}
.bcount{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;border-radius:8px;font-size:9px;font-weight:700;margin-left:3px;padding:0 3px}
.bcount.red{background:var(--red);color:white}
.bcount.purple{background:var(--purple);color:white}
.bcount.orange{background:var(--orange);color:white}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.cat-pills{display:flex;gap:6px;flex-shrink:0}
.cpill{padding:5px 14px;border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;border-radius:20px;background:transparent;transition:all 0.15s}
.cpill.active{background:var(--text);border-color:var(--text);color:white}
.cpill.w.active{background:var(--blue);border-color:var(--blue);color:white}
.cpill.p.active{background:var(--green);border-color:var(--green);color:white}
.search-wrap{flex:1;min-width:0}
.search-input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:9px;font-size:12px;font-family:var(--font);color:var(--text);background:var(--bg);outline:none}
.search-input:focus{border-color:var(--green)}
.btn-reset{flex-shrink:0;padding:7px 10px;background:var(--red-bg);border:1px solid var(--red-b);border-radius:9px;color:var(--red);font-size:12px;font-weight:700;cursor:pointer}
.btn-refresh{flex-shrink:0;padding:7px 12px;background:var(--green);border:none;border-radius:9px;color:white;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* EMPRESAS — colores por clave */
.comp-green{--cc:var(--green);--ccb:var(--green-bg);--ccbd:var(--green-b)}
.comp-blue{--cc:var(--blue);--ccb:var(--blue-bg);--ccbd:var(--blue-b)}
.comp-purple{--cc:var(--purple);--ccb:var(--purple-bg);--ccbd:var(--purple-b)}
.comp-orange{--cc:var(--orange);--ccb:var(--orange-bg);--ccbd:var(--orange-b)}
.comp-red{--cc:var(--red);--ccb:var(--red-bg);--ccbd:var(--red-b)}
.comp-amber{--cc:var(--amber);--ccb:var(--amber-bg);--ccbd:var(--amber-b)}
.comp-slate{--cc:#475569;--ccb:#f1f5f9;--ccbd:#e2e8f0}
.comp-sky{--cc:var(--sky);--ccb:var(--sky-bg);--ccbd:var(--sky-b)}
.comp-yellow{--cc:var(--yellow);--ccb:var(--yellow-bg);--ccbd:var(--yellow-b)}
.comp-pink{--cc:var(--pink);--ccb:var(--pink-bg);--ccbd:var(--pink-b)}

/* FILA DE EMPRESAS (scroll horizontal) */
.comp-pills{display:flex;gap:6px;padding:8px 14px;overflow-x:auto;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.comp-pills::-webkit-scrollbar{display:none}
.cmp{flex-shrink:0;padding:7px 13px;border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;border-radius:18px;background:transparent;white-space:nowrap;min-height:36px;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.cmp .cdot{width:8px;height:8px;border-radius:50%;background:var(--cc,var(--muted2));flex-shrink:0}
.cmp.active{color:#fff;border-color:transparent;background:var(--cc,var(--text))}
.cmp.active .cdot{background:rgba(255,255,255,0.9)}
.cmp .ccount{font-family:var(--mono);font-size:10px;opacity:.8}

/* CHIP DE EMPRESA EN CARDS Y HEADERS */
.comp-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;background:var(--ccb);color:var(--cc);border:1px solid var(--ccbd)}
.section-hdr .comp-chip{font-size:10px}
.cg-av.av-comp{background:var(--ccb);color:var(--cc)}

/* SELECTOR DE EMPRESA EN MODALES */
.chip-row{display:flex;gap:6px;overflow-x:auto;padding:2px 0;margin-bottom:14px;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.qchip{flex-shrink:0;padding:7px 11px;border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;border-radius:16px;background:transparent;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;min-height:36px}
.qchip .cdot{width:7px;height:7px;border-radius:50%;background:var(--cc,var(--muted2))}
.qchip.active{color:#fff;border-color:transparent;background:var(--cc,var(--text))}
.qchip.active .cdot{background:rgba(255,255,255,.9)}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:10px 14px max(96px,calc(env(safe-area-inset-bottom) + 88px));background:var(--bg)}

/* SECCIÓN */
.section-hdr{display:flex;align-items:center;gap:8px;margin:16px 0 8px;font-size:11px;font-weight:700;color:var(--cc,var(--muted));text-transform:uppercase;letter-spacing:0.5px}
.section-hdr:first-child{margin-top:4px}
.section-hdr::after{content:'';flex:1;height:2px;border-radius:2px;background:var(--ccbd,var(--border))}

/* VISTA HOY — encabezados de bucket con semáforo */
.hoy-hdr{display:flex;align-items:center;gap:7px;margin:14px 0 7px;font-size:12px;font-weight:800;letter-spacing:.2px}
.hoy-hdr:first-child{margin-top:2px}
.hoy-hdr .hoy-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.hoy-hdr .hoy-n{font-family:var(--mono);font-size:11px;font-weight:600;opacity:.7}
.hoy-hdr.b-over{color:var(--red)} .hoy-hdr.b-over .hoy-dot{background:var(--red)}
.hoy-hdr.b-today{color:var(--orange)} .hoy-hdr.b-today .hoy-dot{background:var(--orange)}
.hoy-hdr.b-urgent{color:var(--red)} .hoy-hdr.b-urgent .hoy-dot{background:var(--red)}
.hoy-hdr.b-tom{color:var(--amber)} .hoy-hdr.b-tom .hoy-dot{background:var(--amber)}
.hoy-hdr.b-week{color:var(--muted)} .hoy-hdr.b-week .hoy-dot{background:var(--muted2)}
/* franja resumen de empresas en Hoy */
.hoy-strip{display:flex;gap:6px;overflow-x:auto;padding:2px 0 4px;margin-bottom:4px;scrollbar-width:none}
.hoy-strip::-webkit-scrollbar{display:none}
.hoy-cpill{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:14px;background:var(--ccb);border:1px solid var(--ccbd);font-size:11px;font-weight:700;color:var(--cc);cursor:pointer}
.hoy-cpill .hoy-cn{font-family:var(--mono)}

/* GRUPO */
.cgroup{margin-bottom:10px;content-visibility:auto;contain-intrinsic-size:auto 160px}
.cg-hdr{display:flex;align-items:center;gap:8px;padding:4px 2px}
.cg-av{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;font-family:var(--mono)}
.av-w{background:var(--blue-bg);color:var(--blue)}
.av-p{background:var(--green-bg);color:var(--green)}
.av-sin{background:var(--purple-bg);color:var(--purple)}
.av-mio{background:var(--orange-bg);color:var(--orange)}
.cg-name{font-size:13px;font-weight:700;color:var(--text)}
.cg-icon{display:inline-flex;align-items:center;opacity:0.6}
.cg-cnt{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted2)}

/* TASK CARD */
/* fondo tenue + acento del color de la empresa; prioridad va en el punto y el pill */
.tcard{background:var(--ccb,var(--card));border:1px solid var(--ccbd,var(--border));border-left:4px solid var(--cc,#cbd5e1);border-radius:12px;margin-bottom:6px;overflow:hidden;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,0.04)}
.tc-top{display:flex;align-items:flex-start;gap:10px;padding:11px 13px}
.tc-body{flex:1;min-width:0}
.tc-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.tc-task{font-size:14px;font-weight:600;color:var(--text);line-height:1.34;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tc-prev{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.tc-meta{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-top:6px}
.tc-meta .tc-time{margin-left:auto}
.tc-time{font-family:var(--mono);font-size:9px;color:var(--muted2);flex-shrink:0}
/* prioridad baja: atenuar para que lo urgente resalte */
.tcard.pr3,.tcard.pr-sin{opacity:.92}
.prio-dot{margin-top:5px}
.tc-pill{display:inline-flex;padding:3px 9px;border-radius:7px;font-size:11px;font-weight:600;margin-top:4px}
.pill-p1{background:var(--p1-bg);color:var(--p1);border:1px solid var(--p1-b)}
.pill-p2{background:var(--p2-bg);color:var(--p2);border:1px solid var(--p2-b)}
.pill-p3{background:var(--p3-bg);color:var(--p3);border:1px solid var(--p3-b)}
.pill-sin{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-b)}
.pill-mio{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-b)}
.tc-tag-comp{display:inline-flex;align-items:center;padding:2px 7px;border-radius:6px;font-size:9px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-b)}
.sinresp-intro{font-size:12px;color:var(--muted2);padding:4px 4px 12px;line-height:1.4}
.meet-badge{margin-left:6px;display:inline-flex;align-items:center;padding:2px 7px;border-radius:6px;font-family:var(--mono);font-size:9px;background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-b)}
.due-badge{margin-left:6px;display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:6px;font-family:var(--mono);font-size:9px;font-weight:600;white-space:nowrap}
.due-over{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b)}
.due-now{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-b)}
.due-soon{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-b)}
.due-far{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
.btn-due,.btn-recur{flex-shrink:0;padding:7px 10px;background:var(--card);border:1px solid var(--border);border-radius:9px;color:var(--muted);cursor:pointer;display:flex;align-items:center;min-height:40px}
.btn-due.active{background:var(--amber);border-color:var(--amber);color:#fff}
.btn-recur.active{background:var(--purple);border-color:var(--purple);color:#fff}

/* RECURRENTES (lista de reglas) */
.recur-add{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;margin:6px 0 12px;border:1px dashed var(--border);border-radius:11px;background:var(--card);color:var(--purple);font-size:13px;font-weight:700;cursor:pointer}
.rrow{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:7px;box-shadow:0 1px 2px rgba(0,0,0,0.04)}
.rrow.off{opacity:0.55}
.rrow-body{flex:1;min-width:0}
.rrow-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.rrow-meta{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rrow-cad{font-family:var(--mono);font-size:10px;color:var(--purple);background:var(--purple-bg);border:1px solid var(--purple-b);padding:1px 6px;border-radius:5px}
.rrow-next{font-family:var(--mono);font-size:10px;color:var(--muted2)}
.rbtn{flex-shrink:0;width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:var(--card);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer}
.rbtn.del{border-color:var(--red-b);color:var(--red)}

/* PRIORIDAD DOT */
.prio-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-p1{background:var(--p1)}
.dot-p2{background:var(--p2)}
.dot-p3{background:var(--p3)}
.dot-sin{background:var(--purple)}
.dot-mio{background:var(--orange)}

.tc-detail{border-top:1px solid var(--border);padding:11px 13px;background:var(--card2);display:none}
.tc-detail.open{display:block}
.dl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.dtask{font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;padding:9px 11px;background:var(--card);border-radius:9px;border:1px solid var(--border);line-height:1.5}
.dactions{display:flex;gap:6px}
.btn-ok{flex:1;padding:10px;background:var(--green);border:none;color:white;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer}
.btn-keep{flex:1;padding:10px;background:var(--amber-bg);border:1px solid var(--amber-b);color:var(--amber);border-radius:9px;font-size:12px;font-weight:700;cursor:pointer}
.btn-zz{padding:10px 12px;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:9px;font-size:12px;cursor:pointer}
.btn-edit{padding:10px 12px;background:var(--card);border:1px solid var(--blue-b);color:var(--blue);border-radius:9px;font-size:12px;cursor:pointer}
.btn-x{padding:10px 12px;background:var(--card);border:1px solid var(--red-b);color:var(--red);border-radius:9px;font-size:12px;cursor:pointer}

/* CHIPS */
.action-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.achip{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:18px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid;text-decoration:none;transition:transform 0.1s,opacity 0.1s;white-space:nowrap}
.achip:active{transform:scale(0.96);opacity:0.85}
.achip-cal{background:#f5f3ff;color:var(--purple);border-color:#ddd6fe}
.achip-tel{background:#f0fdf4;color:var(--green);border-color:#bbf7d0}
.achip-mail{background:#eff6ff;color:var(--blue);border-color:#bfdbfe}
.achip-cbu{background:#fffbeb;color:var(--amber);border-color:#fde68a}
.achip-alias{background:#fffbeb;color:var(--amber);border-color:#fde68a}
.achip-addr{background:#fef2f2;color:var(--red);border-color:#fecaca}
.achip-wa{background:#ecfdf5;color:#059669;border-color:#a7f3d0}
.achip-icon{display:inline-flex;align-items:center;flex-shrink:0}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:300;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:14px;padding:20px;width:100%;max-width:380px;box-shadow:0 10px 30px rgba(0,0,0,0.2)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:14px;color:var(--text)}
.modal-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;display:block}
.modal-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:9px;font-size:14px;font-family:var(--font);color:var(--text);background:var(--bg);margin-bottom:14px;outline:none}
.modal-input:focus{border-color:var(--green)}
.modal-prio{display:flex;gap:6px;margin-bottom:16px}
.mp{flex:1;padding:8px;border:1px solid var(--border);border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:transparent;color:var(--muted)}
.mp.active{background:var(--text);border-color:var(--text);color:#fff}
.mp.active.p1{background:var(--p1-bg);border-color:var(--p1-b);color:var(--p1)}
.mp.active.p2{background:var(--p2-bg);border-color:var(--p2-b);color:var(--p2)}
.mp.active.p3{background:var(--p3-bg);border-color:var(--p3-b);color:var(--p3)}
.modal-actions{display:flex;gap:8px}
.btn-cancel{flex:1;padding:10px;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:9px;font-size:13px;font-weight:600;cursor:pointer}
.btn-save{flex:1;padding:10px;background:var(--green);border:none;color:white;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer}
.tcard.dismissing{animation:out 0.28s ease forwards}
@keyframes out{to{opacity:0;transform:translateX(40px);max-height:0;margin:0;padding:0;border:none}}

.empty{text-align:center;padding:50px 16px}
.empty-icon{display:flex;justify-content:center;margin-bottom:10px;opacity:0.35}
.empty-title{font-size:16px;font-weight:700}
.empty-sub{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.6}
.loading{text-align:center;padding:50px 16px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px}
.lt{font-family:var(--mono);font-size:10px;color:var(--muted2)}
.err{margin:10px 0;padding:12px;background:var(--red-bg);border:1px solid var(--red-b);border-radius:11px;font-size:12px;color:var(--red);text-align:center;line-height:1.5}
.toast{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);border-radius:11px;padding:9px 16px;font-size:12px;font-weight:600;color:white;white-space:nowrap;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,0.2);transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;display:flex;align-items:center;gap:0}
.toast.show{transform:translateX(-50%) translateY(0);pointer-events:all}
.toast-undo{margin-left:10px;background:transparent;border:1px solid rgba(255,255,255,0.5);border-radius:7px;color:white;font-size:11px;font-weight:700;padding:3px 8px;cursor:pointer;flex-shrink:0}

/* MODAL FEEDBACK (bottom sheet) */
.modal-feedback{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:flex-end;justify-content:center;z-index:320}
.modal-feedback.show{display:flex}
.mf-box{background:var(--card);border-radius:18px 18px 0 0;padding:20px 20px max(20px,env(safe-area-inset-bottom));width:100%;max-width:440px;box-shadow:0 -4px 30px rgba(0,0,0,0.25);animation:sheetUp .28s cubic-bezier(.34,1.3,.64,1)}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mf-title{font-size:16px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.mf-sub{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.4;word-break:break-word}
.mf-btns{display:flex;flex-direction:column;gap:8px;margin-bottom:6px}
.mf-btn-error,.mf-btn-done{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;border:1px solid;min-height:48px}
.mf-btn-error{background:var(--amber-bg);border-color:var(--amber-b);color:var(--amber)}
.mf-btn-done{background:var(--green-bg);border-color:var(--green-b);color:var(--green)}
.mf-cancel{width:100%;padding:12px;background:transparent;border:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;min-height:44px}

/* FAB QUICK-ADD */
.fab{position:fixed;right:16px;bottom:max(20px,env(safe-area-inset-bottom));width:56px;height:56px;border-radius:50%;background:var(--green);border:none;color:#fff;box-shadow:0 6px 18px rgba(22,163,74,0.45);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:150}

/* QUICK-ADD (bottom sheet) */
.qa-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:flex-end;justify-content:center;z-index:320}
.qa-overlay.show{display:flex}
.qa-box{background:var(--card);border-radius:18px 18px 0 0;padding:18px 18px max(18px,env(safe-area-inset-bottom));width:100%;max-width:440px;box-shadow:0 -4px 30px rgba(0,0,0,0.25);animation:sheetUp .28s cubic-bezier(.34,1.3,.64,1)}
.qa-title{font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.qa-text{width:100%;min-height:84px;padding:12px;border:1px solid var(--border);border-radius:11px;font-size:16px;font-family:var(--font);color:var(--text);background:var(--bg);outline:none;resize:none;line-height:1.45}
.qa-text:focus{border-color:var(--green)}
.qa-row{display:flex;gap:8px;margin-top:12px;align-items:stretch}
.qa-mic{width:52px;flex-shrink:0;border-radius:12px;border:1px solid var(--border);background:var(--bg);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer}
.qa-mic.rec{background:var(--red-bg);border-color:var(--red-b);color:var(--red);animation:breathe 1.2s infinite}
.qa-send{flex:1;padding:14px;background:var(--green);border:none;color:#fff;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;min-height:48px}
.qa-send:disabled{opacity:0.5}
.qa-status{font-size:12px;color:var(--muted);margin-top:10px;min-height:16px;text-align:center}
.qa-status.rec{color:var(--red);font-weight:600}
.qa-cancel{width:100%;padding:10px;margin-top:4px;background:transparent;border:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;min-height:44px}

/* TOUCH TARGETS */
.bt{min-height:44px}
.bt svg{vertical-align:-3px;margin-right:3px}
.cpill{padding:9px 13px}
.cpill svg{vertical-align:-2px;margin-right:3px}
.btn-reset,.btn-refresh{min-height:40px}

/* PRESS FEEDBACK */
.tcard{transition:transform .1s}
.tcard:active{transform:scale(.992)}
.bt:active,.cpill:active,.btn-refresh:active,.btn-reset:active,.btn-ok:active,.btn-keep:active,.btn-zz:active,.btn-edit:active,.btn-x:active,.mp:active,.btn-save:active,.btn-cancel:active,.fab:active,.qa-send:active,.qa-mic:active,.mf-btn-error:active,.mf-btn-done:active{transform:scale(.96)}

/* FOCUS VISIBLE (teclado) */
button:focus-visible,a:focus-visible,input:focus-visible,textarea:focus-visible,[role="article"]:focus-visible{outline:2px solid var(--blue);outline-offset:2px}

/* REDUCED MOTION */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginScreen" role="dialog" aria-modal="true" aria-label="Iniciar sesión">
  <div class="login-box">
    <div class="login-title">Pendiente<span style="color:var(--green)">AI</span></div>
    <div class="login-sub">Ingresá tu token de acceso</div>
    <input type="password" class="modal-input" id="loginToken" placeholder="Token" autocomplete="current-password" style="margin-bottom:8px" />
    <button type="button" class="btn-save" style="width:100%" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="loginErr" role="alert" aria-live="polite"></div>
  </div>
</div>

<div class="app">
  <div class="hdr">
    <div class="hdr-top">
      <div class="logo">Pendiente<span>AI</span></div>
      <div style="display:flex;align-items:center;gap:6px">
        <button type="button" class="hdr-gear hdr-icon" id="sinRespBtn" onclick="setView('sinresp')" title="Sin responder" aria-label="Mensajes sin responder" style="display:none;position:relative"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg><span class="hdr-badge" id="bc-s" style="display:none">0</span></button>
        <button type="button" class="hdr-gear" id="gearBtn" onclick="openSettings()" title="Avisos" aria-label="Ajustes de avisos" style="display:none"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></button>
        <div class="badge"><div class="dot" id="dot"></div><span id="conn">Conectando...</span></div>
      </div>
    </div>
    <div class="btabs">
      <button type="button" class="bt active" data-tab="hoy" onclick="setView('hoy')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>Hoy <span class="bcount red" id="bc-hoy" style="display:none">0</span>
      </button>
      <button type="button" class="bt" data-tab="todo" onclick="setView('todo')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>Todo
      </button>
      <button type="button" class="bt" data-tab="agenda" onclick="setView('agenda')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Agenda
      </button>
      <button type="button" class="bt" data-tab="recur" onclick="setView('recur')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>Repetir
      </button>
    </div>
  </div>

  <div class="comp-pills" id="compPills"></div>

  <div class="toolbar">
    <div class="search-wrap">
      <input type="search" class="search-input" id="searchInput" placeholder="Buscar..." oninput="renderTasks()" aria-label="Buscar tareas">
    </div>
    <button type="button" class="btn-reset" id="resetBtn" onclick="resetAll()" title="Borrar todo" aria-label="Borrar todo"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg></button>
     <button type="button" class="btn-refresh" id="scanBtn" onclick="loadAll()" aria-label="Actualizar tareas">
      <svg id="refreshIcon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>
    </button>
  </div>

  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div><div class="lt">Cargando...</div></div>
  </div>
</div>

<!-- MODAL FEEDBACK -->
<div class="modal-feedback" id="feedbackModal" role="dialog" aria-modal="true" aria-label="Descartar tarea" onclick="closeFeedback()">
  <div class="mf-box" onclick="event.stopPropagation()">
    <div class="mf-title"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>¿Por qué descartás esta tarea?</div>
    <div class="mf-sub" id="feedbackTaskPreview"></div>
    <div class="mf-btns">
      <button type="button" class="mf-btn-error" onclick="submitFeedback('error')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>La IA se equivocó</button>
      <button type="button" class="mf-btn-done" onclick="submitFeedback('done')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>Ya lo resolví</button>
    </div>
    <button type="button" class="mf-cancel" onclick="closeFeedback()">Cancelar</button>
  </div>
</div>

<!-- MODAL POSPONER -->
<div class="modal-feedback" id="postponeModal" role="dialog" aria-modal="true" aria-label="Posponer tarea" onclick="closePostpone()">
  <div class="mf-box" onclick="event.stopPropagation()">
    <div class="mf-title"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>¿Para cuándo lo dejamos?</div>
    <div class="mf-sub" id="postponePreview"></div>
    <div class="mf-btns">
      <button type="button" class="mf-btn-error" onclick="doPostpone('tom')">Mañana</button>
      <button type="button" class="mf-btn-error" onclick="doPostpone('weekend')">El finde</button>
      <button type="button" class="mf-btn-error" onclick="doPostpone('nextweek')">Semana próxima</button>
      <button type="button" class="mf-btn-done" onclick="document.getElementById('postponeDate').showPicker?document.getElementById('postponeDate').showPicker():document.getElementById('postponeDate').click()">Elegir fecha…</button>
      <input type="date" id="postponeDate" style="position:absolute;opacity:0;width:1px;height:1px;pointer-events:none" onchange="doPostpone(this.value)">
    </div>
    <button type="button" class="mf-cancel" onclick="closePostpone()">Cancelar</button>
  </div>
</div>

<!-- MODAL EDITAR -->
<div class="modal-overlay" id="editModal" role="dialog" aria-modal="true" aria-labelledby="editModalTitle" onclick="closeEdit()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="editModalTitle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;vertical-align:-2px"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Editar tarea</div>
    <label class="modal-label" for="editText">Descripción</label>
    <input type="text" class="modal-input" id="editText" maxlength="200" />
    <label class="modal-label" for="editPhone">Teléfono WhatsApp <span style="font-weight:400;color:var(--muted2)">(opcional — se guarda para este contacto)</span></label>
    <input type="tel" class="modal-input" id="editPhone" maxlength="20" placeholder="+54 9 2915 044165" />
    <label class="modal-label">Empresa</label>
    <div class="chip-row" id="editComp"></div>
    <label class="modal-label" for="editDue">Fecha límite <span style="font-weight:400;color:var(--muted2)">(opcional)</span></label>
    <input type="date" class="modal-input" id="editDue" />
    <label class="modal-label">Prioridad</label>
    <div class="modal-prio">
      <button type="button" class="mp p1" data-p="ahora" onclick="setEditPrio('ahora',this)"><svg width="8" height="8" viewBox="0 0 8 8" style="margin-right:5px"><circle cx="4" cy="4" r="4" fill="var(--p1)"/></svg>Urgente</button>
      <button type="button" class="mp p2" data-p="hoy" onclick="setEditPrio('hoy',this)"><svg width="8" height="8" viewBox="0 0 8 8" style="margin-right:5px"><circle cx="4" cy="4" r="4" fill="var(--p2)"/></svg>Media</button>
      <button type="button" class="mp p3" data-p="semana" onclick="setEditPrio('semana',this)"><svg width="8" height="8" viewBox="0 0 8 8" style="margin-right:5px"><circle cx="4" cy="4" r="4" fill="var(--p3)"/></svg>Baja</button>
    </div>
    <div class="modal-actions">
      <button type="button" class="btn-cancel" onclick="closeEdit()">Cancelar</button>
      <button type="button" class="btn-save" onclick="saveEdit()">Guardar</button>
    </div>
  </div>
</div>

<!-- FAB QUICK-ADD -->
<button type="button" class="fab" id="fab" onclick="openQuickAdd()" aria-label="Agregar tarea" style="display:none">
  <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- MODAL QUICK-ADD -->
<div class="qa-overlay" id="quickAdd" role="dialog" aria-modal="true" aria-label="Agregar tarea" onclick="closeQuickAdd()">
  <div class="qa-box" onclick="event.stopPropagation()">
    <div class="qa-title"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nueva tarea</div>
    <div class="chip-row" id="qaComp"></div>
    <textarea class="qa-text" id="qaText" placeholder="Escribí o dictá una tarea… ej: llamar al contador mañana a la mañana" maxlength="300"></textarea>
    <div class="qa-row">
      <button type="button" class="qa-mic" id="qaMic" onclick="toggleMic()" aria-label="Grabar audio">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <button type="button" class="qa-send" id="qaSend" onclick="sendQuickText()">Anotar</button>
    </div>
    <div class="qa-status" id="qaStatus" aria-live="polite"></div>
    <button type="button" class="qa-cancel" onclick="closeQuickAdd()">Cancelar</button>
  </div>
</div>

<!-- MODAL NUEVA RECURRENTE -->
<div class="modal-overlay" id="recurModal" role="dialog" aria-modal="true" aria-label="Nueva tarea recurrente" onclick="closeRecur()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;vertical-align:-2px"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>Tarea recurrente</div>
    <label class="modal-label" for="recurTitle">Tarea</label>
    <input type="text" class="modal-input" id="recurTitle" maxlength="120" placeholder="Ej: Pagar IVA" />
    <label class="modal-label">Empresa</label>
    <div class="chip-row" id="recurComp"></div>
    <label class="modal-label">Repetición</label>
    <div class="modal-prio" id="recurCad">
      <button type="button" class="mp" data-c="daily" onclick="setRecurCad('daily',this)">Diaria</button>
      <button type="button" class="mp" data-c="weekly" onclick="setRecurCad('weekly',this)">Semanal</button>
      <button type="button" class="mp" data-c="monthly" onclick="setRecurCad('monthly',this)">Mensual</button>
      <button type="button" class="mp" data-c="yearly" onclick="setRecurCad('yearly',this)">Anual</button>
    </div>
    <div id="recurDayWrap"></div>
    <div class="modal-actions">
      <button type="button" class="btn-cancel" onclick="closeRecur()">Cancelar</button>
      <button type="button" class="btn-save" onclick="saveRecur()">Crear</button>
    </div>
  </div>
</div>

<!-- MODAL AJUSTES (avisos WhatsApp) -->

// ── LOGIN ─────────────────────────────────────────────────────────────────────
const loginScreen=document.getElementById('loginScreen');
if(TOKEN)loginScreen.style.display='none';

document.getElementById('loginToken').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function doLogin(){
  const t=document.getElementById('loginToken').value.trim();
  const errEl=document.getElementById('loginErr');
  if(!t){errEl.textContent='Ingresá el token';return;}
  TOKEN=t;
  localStorage.setItem('pai_token',TOKEN);
  errEl.textContent='';
  loginScreen.style.display='none';
  initApp();
}
function showLogin(msg){
  TOKEN='';
  localStorage.removeItem('pai_token');
  document.getElementById('loginToken').value='';
  document.getElementById('loginErr').textContent=msg||'';
  loginScreen.style.display='flex';
  setTimeout(()=>document.getElementById('loginToken').focus(),50);
}

// ── API FETCH ─────────────────────────────────────────────────────────────────
function apiFetch(url,opts={}){
  return fetch(url,{...opts,headers:{...opts.headers,'X-Api-Token':TOKEN}}).then(r=>{
    if(r.status===401){showLogin('Token incorrecto');throw new Error('401');}
    return r;
  });
}

let data={pendiente:[],sin_responder:[],mio:[]};
let expanded=null,companyFilter='all';
let view='hoy'; // hoy | todo | agenda | recur | sinresp
const TASK_VIEWS=['hoy','todo','agenda']; // vistas que usan el pool unificado de tareas

// ── EMPRESAS ────────────────────────────────────────────────────────────────
const COMPANY_ORDER=['financiera','serviwhite','tecnophos','adc','transtide','svn','personal'];
const COMPANY_META={
  financiera:{name:'Financiera',color:'red'},
  serviwhite:{name:'Serviwhite',color:'sky'},
  tecnophos:{name:'Tecnophos',color:'blue'},
  adc:{name:'ADC',color:'yellow'},
  transtide:{name:'Transtide',color:'orange'},
  svn:{name:'SVN',color:'purple'},
  personal:{name:'Personal',color:'pink'},
};
function companyMeta(key){return COMPANY_META[key]||{name:'Sin asignar',color:'slate'};}
function companyClass(key){return 'comp-'+companyMeta(key).color;}

let tt;
function toast(t){
  const el=document.getElementById('toast');
  const ub=document.getElementById('toastUndo');
  document.getElementById('toastTxt').textContent=t;
  ub.style.display='none';
  el.classList.add('show');clearTimeout(tt);
  tt=setTimeout(()=>el.classList.remove('show'),2400);
}
let _toastUndoFn=null;
function toastUndo(msg,undoFn){
  const el=document.getElementById('toast');
  const ub=document.getElementById('toastUndo');
  document.getElementById('toastTxt').textContent=msg;
  _toastUndoFn=undoFn;
  ub.style.display=undoFn?'':'none';
  ub.onclick=()=>{
    if(_toastUndoFn){_toastUndoFn();_toastUndoFn=null;}
    el.classList.remove('show');ub.style.display='none';clearTimeout(tt);
  };
  el.classList.add('show');clearTimeout(tt);
  tt=setTimeout(()=>{el.classList.remove('show');ub.style.display='none';_toastUndoFn=null;},4200);
}
async function resetAll(){
  if(!confirm('¿Borrar TODAS las tareas y el historial? Esta acción no se puede deshacer.')) return;
  const btn = document.getElementById('resetBtn');
  btn.style.opacity = '0.5';
  btn.disabled = true;
  try {
    const r = await apiFetch(API+'/reset', {method:'DELETE'});
    if (r.ok) {
      data = {pendiente:[], sin_responder:[], mio:[]};
      updateBadges();
      renderTasks();
      toast('🗑️ Todo borrado');
    } else {
      toast('Error al borrar');
    }
  } catch(e) {
    toast('Error: '+e.message);
  } finally {
    btn.style.opacity = '';
    btn.disabled = false;
  }
}

function setConn(ok){
  document.getElementById('dot').className='dot'+(ok?'':' off');
  document.getElementById('conn').textContent=ok?'En vivo':'Sin conexión';
}

function setView(v){
  view=v;expanded=null;
  localStorage.setItem('pai_view',v);
  updateTabActive();
  // mostrar/ocultar filtros según la vista
  const showFilters=TASK_VIEWS.includes(v);
  document.getElementById('compPills').style.display=showFilters?'':'none';
  document.querySelector('.toolbar').style.display=(v==='sinresp'||v==='recur')?'none':'';

function updateTabActive(){
  document.querySelectorAll('.bt').forEach(x=>x.classList.toggle('active',x.dataset.tab===view));

function buildCompanyPills(){
  const el=document.getElementById('compPills');
  if(!el)return;
  let html='<button type="button" class="cmp'+(companyFilter==='all'?' active':'')+'" onclick="setCompany(\'all\',this)">Todas</button>';

  }
  el.innerHTML=html;

function updateCompanyCounts(){
  let tasks;
  if(view==='hoy'){tasks=taskPool().filter(t=>hoyBucket(t)!==null);}
  else if(view==='agenda'){tasks=taskPool().filter(t=>t.dueDate);}
  else tasks=taskPool();
  const byComp={};
  tasks.forEach(t=>{const k=t.company||null;byComp[k]=(byComp[k]||0)+1;});
  for(const key of COMPANY_ORDER){
    const el=document.getElementById('cc-'+key);
    if(el)el.textContent=byComp[key]?byComp[key]:'';
  }
}

async function loadAll(){
  const icon=document.getElementById('refreshIcon');
  icon.classList.add('spin');
  try{
    const [r1,r2,r3]=await Promise.all([
      apiFetch(API+'/tasks?type=pendiente'),
      apiFetch(API+'/tasks?type=sin_responder'),
      apiFetch(API+'/tasks?type=mio'),
    ]);
    data.pendiente=_stripResolved(await r1.json());
    data.sin_responder=_stripResolved(await r2.json());
    data.mio=_stripResolved(await r3.json());
    setConn(true);
    updateBadges();
    renderTasks();
  }catch(e){
    if(e.message==='401')return;
    setConn(false);
    document.getElementById('content').innerHTML='<div class="err">Sin conexión<br><small>'+escHtml(e.message)+'</small></div>';
  }finally{
    icon.classList.remove('spin');
  }
}

async function loadBandeja(type){
  const icon=document.getElementById('refreshIcon');
  icon.classList.add('spin');
  try{
    const r=await apiFetch(API+'/tasks?type='+encodeURIComponent(type));
    data[type]=_stripResolved(await r.json());
    setConn(true);
    updateBadges();
    const affects=(type==='sin_responder')?(view==='sinresp'):(TASK_VIEWS.includes(view));
    if(affects)renderTasks();
  }catch(e){
    if(e.message!=='401')setConn(false);
  }finally{
    icon.classList.remove('spin');
  }
}

async function delTask(id){
  try{await apiFetch(API+'/tasks/'+id,{method:'DELETE'});}catch(e){}
  for(const k of Object.keys(data))data[k]=data[k].filter(t=>t.id!=id);
  updateBadges();renderTasks();
}
async function snooze(id){
  try{await apiFetch(API+'/tasks/'+id+'/snooze',{method:'PATCH'});}catch(e){}
  for(const k of Object.keys(data)){const t=data[k].find(x=>x.id==id);if(t){t.priority='semana';}}
  renderTasks();toast('😴 Postergado');
}
// ── POSPONER A FECHA ──
let postponeId=null;
function isoLocal(d){return d.toLocaleDateString('en-CA');}
function dateAddDays(n){const d=new Date();d.setHours(12,0,0,0);d.setDate(d.getDate()+n);return isoLocal(d);}
function dateNextDow(target){const d=new Date();d.setHours(12,0,0,0);let add=(target-d.getDay()+7)%7;if(add===0)add=7;d.setDate(d.getDate()+add);return isoLocal(d);}
function openPostpone(e,id){
  if(e)e.stopPropagation();
  postponeId=id;
  let task=null;for(const k of Object.keys(data)){task=data[k].find(t=>t.id==id);if(task)break;}
  document.getElementById('postponePreview').textContent=task?(task.task||task.preview||''):'';
  document.getElementById('postponeModal').classList.add('show');
}
function closePostpone(){document.getElementById('postponeModal').classList.remove('show');postponeId=null;}
async function doPostpone(when){
  if(!postponeId)return;
  const id=postponeId;
  let due;
  if(when==='tom')due=dateAddDays(1);
  else if(when==='weekend')due=dateNextDow(6); // sábado
  else if(when==='nextweek')due=dateNextDow(1); // lunes
  else if(/^\d{4}-\d{2}-\d{2}$/.test(when))due=when;
  else return;
  closePostpone();
  document.getElementById('card-'+id)?.classList.add('dismissing');
  try{await apiFetch(API+'/tasks/'+id+'/postpone',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({dueDate:due})});}
  catch(e){if(e.message==='401')return;}
  for(const k of Object.keys(data)){const t=data[k].find(x=>x.id==id);if(t){t.dueDate=due;t.priority='semana';}}
  setTimeout(()=>renderTasks(),290);
  toast('📅 Pospuesta al '+fmtDate(due));
}
async function keepTask(id){
  try{await apiFetch(API+'/tasks/'+id+'/keep',{method:'PATCH'});}catch(e){}
  const t=data.sin_responder.find(x=>x.id==id);
  if(t){t.type='pendiente';data.pendiente.push(t);data.sin_responder=data.sin_responder.filter(x=>x.id!=id);}
  updateBadges();renderTasks();toast('📥 Movido a Pendientes');
}

function editTask(e,id){
  e.stopPropagation();

  for(const k of Object.keys(data)){const t=data[k].find(x=>x.id==id);if(t){task=t;break;}}
  if(!task)return;
  editingId=id;
  editingPrio=task.priority||'hoy';

  document.querySelectorAll('.mp').forEach(b=>b.classList.toggle('active',b.dataset.p===editingPrio));
  buildEditComp();
  document.getElementById('editModal').classList.add('show');
  setTimeout(()=>document.getElementById('editText').focus(),100);

function setEditPrio(p,btn){
  editingPrio=p;
  document.querySelectorAll('.mp').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function closeEdit(){
  document.getElementById('editModal').classList.remove('show');
  editingId=null;
}
async function saveEdit(){
  if(!editingId)return;
  const newTask=document.getElementById('editText').value.trim();
  if(newTask.length<2){toast('Texto muy corto');return;}
  try{
    const phone=document.getElementById('editPhone').value.trim()||null;
    const r=await apiFetch(API+'/tasks/'+editingId+'/edit',{
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({task:newTask,priority:editingPrio,phone,company:editingCompany,dueDate:document.getElementById('editDue').value||null})
    });
    if(!r.ok)throw new Error('save failed');
    const _due=document.getElementById('editDue').value||null;
    for(const k of Object.keys(data)){const t=data[k].find(x=>x.id==editingId);if(t){t.task=newTask;t.priority=editingPrio;t.company=editingCompany||null;t.dueDate=_due;if(phone)t.phone=phone.replace(/\D/g,'');break;}}
    closeEdit();renderTasks();toast('Tarea actualizada');
  }catch(e){
    if(e.message!=='401')toast('Error al guardar');
  }
}

function updateBadges(){
  const n=(data.sin_responder||[]).length;
  const el=document.getElementById('bc-s');
  if(el){el.textContent=n;el.style.display=n>0?'':'none';}
}

function ini(n){return(n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function hrs(h){
  if(h<1){const m=Math.round(h*60);return m<2?'ahora':m+'min';}
  if(h<24)return Math.round(h)+'h';
  return Math.floor(h/24)+'d';
}
function fmtDate(iso){const p=iso.split('-');return p[2]+'/'+p[1];}
function dueInfo(due){
  if(!due)return null;
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(due+'T00:00:00');
  if(isNaN(d.getTime()))return null;
  const diff=Math.round((d-today)/86400000);
  if(diff<0)return{cls:'due-over',label:'Vencida '+(-diff)+'d',diff};
  if(diff===0)return{cls:'due-now',label:'Vence hoy',diff};
  if(diff===1)return{cls:'due-now',label:'Vence mañana',diff};
  if(diff<=7)return{cls:'due-soon',label:'En '+diff+'d',diff};
  return{cls:'due-far',label:fmtDate(due),diff};
}

function prioClass(t){
  if(t.type==='sin_responder')return{card:'pr-sin',pill:'pill-sin',dot:'dot-sin',label:'Sin responder'};
  const p=t.priority||'semana';
  if(p==='ahora')return{card:'pr1',pill:'pill-p1',dot:'dot-p1',label:'Urgente'};
  if(p==='hoy')return{card:'pr2',pill:'pill-p2',dot:'dot-p2',label:'Media'};
  return{card:'pr3',pill:'pill-p3',dot:'dot-p3',label:'Baja'};
}

// Pool unificado de tareas: pendientes detectadas + mis compromisos
function taskPool(){return [...(data.pendiente||[]),...(data.mio||[])];}
function applyFilters(tasks){
  if(companyFilter!=='all')tasks=tasks.filter(t=>(t.company||null)===companyFilter);
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase().trim();
  if(q)tasks=tasks.filter(t=>
    (t.contact||'').toLowerCase().includes(q)||
    (t.task||'').toLowerCase().includes(q)||
    (t.preview||'').toLowerCase().includes(q)
  );
  return tasks;
}
function getFiltered(){return applyFilters(taskPool());}
const PRANK={ahora:0,hoy:1,semana:2};
function prank(t){const r=PRANK[t.priority];return r===undefined?1:r;}
function groupByContact(tasks){
  const map={},order=[];
  tasks.forEach(t=>{if(!map[t.contact]){map[t.contact]=[];order.push(t.contact);}map[t.contact].push(t);});
  const groups=order.map(c=>({
    contact:c,
    tasks:map[c].slice().sort((a,b)=>prank(a)-prank(b)||(b.hours||0)-(a.hours||0))
  }));
  // Grupos: el contacto con la tarea más urgente primero
  groups.sort((g1,g2)=>Math.min(...g1.tasks.map(prank))-Math.min(...g2.tasks.map(prank)));
  return groups;
}

// ── VISTA HOY (unificada y priorizada) ───────────────────────────────────────
// Clasifica cada tarea en un único bucket según urgencia/vencimiento.
function hoyBucket(t){
  const di=dueInfo(t.dueDate);
  if(di){
    if(di.diff<0)return 'over';
    if(di.diff===0)return 'today';
    if(di.diff===1)return 'tom';
    // 2-7 dias ya NO entra a Hoy: eso vive en Agenda
  }
  if(t.priority==='ahora')return 'urgent';
  return null; // lo que vence mas adelante o sin urgencia no entra a Hoy
}
function hoyTasks(){
  let tasks=[...(data.pendiente||[]),...(data.mio||[])];
  if(companyFilter!=='all')tasks=tasks.filter(t=>(t.company||null)===companyFilter);
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase().trim();
  if(q)tasks=tasks.filter(t=>(t.contact||'').toLowerCase().includes(q)||(t.task||'').toLowerCase().includes(q)||(t.preview||'').toLowerCase().includes(q));
  return tasks.filter(t=>hoyBucket(t)!==null);
}

    {k:'over',cls:'b-over',name:'Vencidas'},

    {k:'tom',cls:'b-tom',name:'Mañana'},
  ];
  const grouped={};tasks.forEach(t=>{const b=hoyBucket(t);(grouped[b]=grouped[b]||[]).push(t);});
  let html='',gi=0;
  for(const b of buckets){
    const list=grouped[b.k];if(!list||!list.length)continue;

    list.sort((a,b2)=>{
      const da=a.dueDate||'9999',db=b2.dueDate||'9999';

    });

    list.forEach(t=>{html+=renderHoyItem(t,gi++);});
  }

function cadenceDesc(r){
  const n=r.interval||1;
  if(r.cadence==='daily')return n>1?('Cada '+n+' días'):'Todos los días';
  if(r.cadence==='weekly')return(n>1?('Cada '+n+' sem · '):'Cada ')+DOW_SHORT[r.dayOfWeek||0];
  if(r.cadence==='monthly')return(n>1?('Cada '+n+' meses'):'Cada mes')+' (día '+r.dayOfMonth+')';
  if(r.cadence==='yearly')return(n>1?('Cada '+n+' años'):'Cada año')+' '+r.dayOfMonth+' '+MON_SHORT[r.month||1];
  return r.cadence;
}

function copyToClipboard(text,label){
  navigator.clipboard.writeText(text).then(()=>{
    toast('📋 '+(label||'Copiado'));
  }).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=text;ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');toast('📋 '+(label||'Copiado'));}
    catch(e){toast('Error al copiar');}
    document.body.removeChild(ta);
  });
}

function openCalendarGoogle(action,contact){
  const title=encodeURIComponent(action.title||('Evento con '+contact));
  let dt='';
  if(action.date&&action.time){
    const d=action.date.replace(/-/g,'');
    const t=(action.time+':00').replace(/:/g,'').slice(0,6);
    const startDT=d+'T'+t;
    const endHour=String((parseInt(t.slice(0,2))+1)%24).padStart(2,'0');
    const endDT=d+'T'+endHour+t.slice(2);
    dt='&dates='+startDT+'/'+endDT;
  }else if(action.date){
    const d=action.date.replace(/-/g,'');
    dt='&dates='+d+'/'+d;
  }
  window.open('https://calendar.google.com/calendar/render?action=TEMPLATE&text='+title+dt,'_blank');
}

  let dueBadge='';
  const _di=dueInfo(t.dueDate);
  if(_di)dueBadge='<span class="due-badge '+_di.cls+'"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'+_di.label+'</span>';
  let actions='';
  if(isSin){
    actions=
      '<button type="button" class="btn-ok" onclick="resolve('+t.id+')" aria-label="Ya respondí">'+IC.check+' Ya respondí</button>'+
      '<button type="button" class="btn-keep" onclick="keepTask('+t.id+')" aria-label="Mover a pendientes">'+IC.inbox+' Es pendiente</button>'+
      '<button type="button" class="btn-edit" onclick="editTask(event,'+t.id+')" aria-label="Editar">'+IC.edit+'</button>'+
      '<button type="button" class="btn-x" onclick="deleteTask('+t.id+')" aria-label="Eliminar">'+IC.trash+'</button>';
  }else{
    actions=
      '<button type="button" class="btn-ok" onclick="resolve('+t.id+')" aria-label="Marcar como listo">'+IC.check+(isMio?' Cumplido':' Listo')+'</button>'+
      '<button type="button" class="btn-edit" onclick="editTask(event,'+t.id+')" aria-label="Editar">'+IC.edit+'</button>'+
      '<button type="button" class="btn-zz" onclick="openPostpone(event,'+t.id+')" aria-label="Posponer">'+IC.clock+'</button>'+
      '<button type="button" class="btn-x" onclick="openFeedback(event,'+t.id+')" aria-label="Descartar">'+IC.trash+'</button>';
  }
  const headline=esc(t.task||t.preview||'');
  const compTag=isMio?'<span class="tc-tag-comp">Compromiso</span>':'';
  const hasContext=t.preview&&t.task&&t.preview.trim()!==t.task.trim();
  return '<div class="tcard '+companyClass(t.company)+' '+pc.card+'" id="card-'+t.id+'" onclick="toggle('+t.id+')" role="article">'+
    '<div class="tc-top">'+
    '<div class="prio-dot '+pc.dot+'" aria-hidden="true"></div>'+
    '<div class="tc-body">'+
    '<div class="tc-task">'+headline+'</div>'+
    '<div class="tc-meta"><span class="tc-pill '+pc.pill+'">'+pc.label+'</span>'+compTag+meetBadge+dueBadge+'<span class="tc-time">'+hrs(t.hours||0)+'</span></div>'+
    '</div></div>'+
    '<div class="tc-detail '+(isOpen?'open':'')+'" onclick="event.stopPropagation()">'+
    (hasContext?'<div class="dl">'+(isSin?'SIN RESPONDER':'MENSAJE')+'</div><div class="dtask">'+esc(t.preview)+'</div>':'')+
    renderActionChips(t)+
    '<div class="dactions">'+actions+'</div>'+
    '</div></div>';
}

function toggle(id){
  if(expanded===id){
    document.querySelector('#card-'+id+' .tc-detail')?.classList.remove('open');
    expanded=null;
  }else{
    if(expanded!==null)document.querySelector('#card-'+expanded+' .tc-detail')?.classList.remove('open');
    expanded=id;
    const det=document.querySelector('#card-'+id+' .tc-detail');
    if(det){det.classList.add('open');setTimeout(()=>det.scrollIntoView({behavior:'smooth',block:'nearest'}),50);}
  }
}

const _pendingResolve={};
function _removeLocal(id){for(const k of Object.keys(data))data[k]=data[k].filter(t=>t.id!=id);}
// oculta de cualquier recarga las tareas resueltas que todavia no se borraron en el server
function _stripResolved(arr){return Array.isArray(arr)?arr.filter(t=>!Object.prototype.hasOwnProperty.call(_pendingResolve,t.id)):(arr||[]);}
async function _apiDelete(id){try{await apiFetch(API+'/tasks/'+id,{method:'DELETE'});}catch(e){}}
let feedbackId = null;

function openFeedback(e, id) {
  if (e) e.stopPropagation();
  feedbackId = id;
  // Buscar la tarea para mostrar preview
  let task = null;
  for (const k of Object.keys(data)) {
    task = data[k].find(t => t.id == id);
    if (task) break;
  }
  document.getElementById('feedbackTaskPreview').textContent = task ? (task.task || task.preview || '') : '';
  document.getElementById('feedbackModal').classList.add('show');
}

function closeFeedback() {
  document.getElementById('feedbackModal').classList.remove('show');
  feedbackId = null;
}

async function submitFeedback(reason) {
  if (!feedbackId) return;
  const id = feedbackId;
  closeFeedback();
  try {
    await apiFetch(API+'/tasks/'+id+'/feedback', {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ reason })
    });
  } catch(e) {}
  // Remover de local
  for (const k of Object.keys(data)) data[k] = data[k].filter(t => t.id != id);
  updateBadges(); renderTasks();
  toast(reason === 'error' ? '🤖 Anotado — la IA aprende' : '✅ Tarea resuelta');
}

function resolve(id){
  if(_pendingResolve[id])return;
  document.getElementById('card-'+id)?.classList.add('dismissing');
  _removeLocal(id);
  setTimeout(()=>{updateBadges();renderTasks();},290);
  toastUndo('✅ Resuelto',()=>{const tm=_pendingResolve[id];if(tm)clearTimeout(tm);delete _pendingResolve[id];loadAll();});
  // se mantiene en _pendingResolve hasta confirmar el DELETE en el server, asi ningun reload (SSE) la trae de vuelta
  _pendingResolve[id]=setTimeout(async()=>{await _apiDelete(id);delete _pendingResolve[id];},4200);
}
function deleteTask(id){
  if(!confirm('¿Eliminar esta tarea?'))return;
  const c=document.getElementById('card-'+id);
  if(c){c.classList.add('dismissing');setTimeout(()=>{delTask(id);toast('🗑️ Eliminada');},280);}
}

// ── MODAL: ESC cierra, Enter guarda ──────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key!=='Escape')return;
  if(document.getElementById('editModal').classList.contains('show'))closeEdit();
  else if(document.getElementById('postponeModal').classList.contains('show'))closePostpone();
  else if(document.getElementById('recurModal').classList.contains('show'))closeRecur();
  else if(document.getElementById('settingsModal').classList.contains('show'))closeSettings();
  else if(document.getElementById('quickAdd').classList.contains('show'))closeQuickAdd();
  else if(document.getElementById('feedbackModal').classList.contains('show'))closeFeedback();
});
document.getElementById('editText').addEventListener('keydown',e=>{
  if(e.key==='Enter'){e.preventDefault();saveEdit();}
});

// ── SSE ───────────────────────────────────────────────────────────────────────
let evtSource=null,sseFailures=0,pollFallback=null;

function startSSE(){
  if(!TOKEN)return;
  if(evtSource)try{evtSource.close();}catch(e){}
  try{
    evtSource=new EventSource(API+'/stream?token='+encodeURIComponent(TOKEN));
    evtSource.addEventListener('connected',()=>{
      sseFailures=0;
      setConn(true);
      if(pollFallback){clearInterval(pollFallback);pollFallback=null;}
    });
    evtSource.addEventListener('task_changed',e=>{
      try{const d=JSON.parse(e.data||'{}');
        if(d.taskType)loadBandeja(d.taskType);else loadAll();
        if(view==='recur')loadRecurring();
      }catch{loadAll();}
    });
    evtSource.onerror=()=>{
      sseFailures++;
      if(sseFailures>=3&&!pollFallback){
        evtSource.close();
        pollFallback=setInterval(loadAll,30000);
        setTimeout(()=>{
          if(pollFallback){clearInterval(pollFallback);pollFallback=null;}
          sseFailures=0;
          startSSE();
        },300000);
      }
    };
  }catch(e){
    if(!pollFallback)pollFallback=setInterval(loadAll,30000);
  }
}

let lastVisibleLoad=0;
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden){
    const now=Date.now();
    if(now-lastVisibleLoad>60000){
      lastVisibleLoad=now;
      if(!evtSource||evtSource.readyState===2)startSSE();
      loadAll();
    }
  }
});

// ── SWIPE & PULL ──────────────────────────────────────────────────────────────
const _cnt=document.getElementById('content');
let _tx=0,_ty=0,_tcid=null,_isPull=false;
_cnt.addEventListener('touchstart',e=>{
  _tx=e.touches[0].clientX;_ty=e.touches[0].clientY;
  const tc=e.target.closest('.tcard');
  _tcid=(tc&&!e.target.closest('.tc-detail')&&!e.target.closest('button')&&!e.target.closest('a'))
    ?parseInt(tc.id.replace('card-',''),10):null;
  _isPull=_cnt.scrollTop===0;
},{passive:true});
_cnt.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-_tx;
  const dy=e.changedTouches[0].clientY-_ty;
  if(_isPull&&dy>80&&Math.abs(dx)<50){loadAll();_isPull=false;return;}
  if(_tcid&&dx<-80&&Math.abs(dy)<60)resolve(_tcid);
  _tcid=null;
},{passive:true});

// ── QUICK-ADD (texto + audio) ──────────────────────────────────────────────────
let qaCompany='';
function buildQaCompany(){
  const el=document.getElementById('qaComp');if(!el)return;
  let html='<button type="button" class="qchip'+(qaCompany===''?' active':'')+'" onclick="setQaCompany(\'\',this)">Auto</button>';
  for(const key of COMPANY_ORDER){const m=companyMeta(key);html+='<button type="button" class="qchip '+companyClass(key)+(qaCompany===key?' active':'')+'" onclick="setQaCompany(\''+key+'\',this)"><span class="cdot"></span>'+m.name+'</button>';}
  el.innerHTML=html;
}
function setQaCompany(k,btn){qaCompany=k;document.querySelectorAll('#qaComp .qchip').forEach(x=>x.classList.remove('active'));if(btn)btn.classList.add('active');}
function openQuickAdd(){
  const st=document.getElementById('qaStatus');
  document.getElementById('qaText').value='';
  st.textContent='';st.className='qa-status';
  document.getElementById('qaSend').disabled=false;
  qaCompany=(companyFilter!=='all')?companyFilter:'';
  buildQaCompany();
  document.getElementById('quickAdd').classList.add('show');
  setTimeout(()=>document.getElementById('qaText').focus(),120);
}
function closeQuickAdd(){
  if(_rec&&_rec.state==='recording'){_discardRec=true;try{_rec.stop();}catch(e){}}
  document.getElementById('quickAdd').classList.remove('show');
}
async function sendQuickText(){
  const t=document.getElementById('qaText').value.trim();
  if(t.length<2){toast('Escribí algo primero');return;}
  const btn=document.getElementById('qaSend');
  const st=document.getElementById('qaStatus');
  btn.disabled=true;st.className='qa-status';st.textContent='Anotando…';
  try{
    const r=await apiFetch(API+'/bot/command',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t,company:qaCompany||undefined})});
    const j=await r.json().catch(()=>({}));
    if(!r.ok)throw new Error(j.error||'error');
    if(j.query){st.className='qa-status';st.textContent='Eso parece una consulta — escribí una tarea para anotar';btn.disabled=false;return;}
    closeQuickAdd();
    toast(j.recurring?('🔁 Recurrente: '+(j.task||'creada')):(j.task?('✅ '+j.task):'✅ Anotado'));
    if(view==='recur')loadRecurring();else loadAll();
  }catch(e){
    if(e.message!=='401')st.textContent='No se pudo anotar, probá de nuevo';
    btn.disabled=false;
  }
}
let _rec=null,_chunks=[],_stream=null,_discardRec=false;
async function toggleMic(){
  const mic=document.getElementById('qaMic');
  const st=document.getElementById('qaStatus');
  if(_rec&&_rec.state==='recording'){_rec.stop();return;}
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia||!window.MediaRecorder){
    toast('Tu navegador no permite grabar audio');return;
  }
  try{_stream=await navigator.mediaDevices.getUserMedia({audio:true});}
  catch(e){toast('Permiso de micrófono denegado');return;}
  _chunks=[];_discardRec=false;
  let mime='';
  for(const m of ['audio/mp4','audio/webm','audio/ogg']){
    try{if(MediaRecorder.isTypeSupported(m)){mime=m;break;}}catch(e){}
  }
  try{_rec=mime?new MediaRecorder(_stream,{mimeType:mime}):new MediaRecorder(_stream);}
  catch(e){_rec=new MediaRecorder(_stream);}
  _rec.ondataavailable=e=>{if(e.data&&e.data.size)_chunks.push(e.data);};
  _rec.onstop=async()=>{
    mic.classList.remove('rec');
    if(_stream){_stream.getTracks().forEach(tr=>tr.stop());_stream=null;}
    if(_discardRec){_discardRec=false;return;}
    const blob=new Blob(_chunks,{type:(_rec&&_rec.mimeType)||mime||'audio/webm'});
    if(blob.size<1200){st.className='qa-status';st.textContent='Audio muy corto';return;}
    st.className='qa-status';st.textContent='Transcribiendo…';
    try{
      const b64=await blobToB64(blob);
      const r=await apiFetch(API+'/bot/audio',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({audio:b64,mime:blob.type,company:qaCompany||undefined})});
      const j=await r.json().catch(()=>({}));
      if(!r.ok)throw new Error(j.error||'error');
      if(j.query){st.className='qa-status';st.textContent='Sonó como una consulta — dictá una tarea para anotar';return;}
      closeQuickAdd();
      toast(j.recurring?('🔁 Recurrente: '+(j.task||'creada')):(j.task?('✅ '+j.task):'✅ Anotado'));
      if(view==='recur')loadRecurring();else loadAll();
    }catch(e){
      if(e.message!=='401')st.textContent='No se entendió el audio, probá de nuevo';
    }
  };
  _rec.start();
  mic.classList.add('rec');
  st.className='qa-status rec';st.textContent='Grabando… tocá el micrófono para terminar';
}
function blobToB64(blob){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=()=>res(String(fr.result).split(',')[1]||'');
    fr.onerror=rej;
    fr.readAsDataURL(blob);
  });
}

// ── AJUSTES / AVISOS ────────────────────────────────────────────────────────
async function openSettings(){
  try{
    const r=await apiFetch(API+'/settings');const s=await r.json();
    document.getElementById('setDigest').checked=!!s.digestEnabled;
    document.getElementById('setDigestTime').value=s.digestTime||'08:00';
    document.getElementById('setWeekly').checked=!!s.weeklyEnabled;
    document.getElementById('setWeeklyTime').value=s.weeklyTime||'18:00';
  }catch(e){if(e.message==='401')return;}
  document.getElementById('settingsModal').classList.add('show');
}
function closeSettings(){document.getElementById('settingsModal').classList.remove('show');}
async function saveSettings(){
  const body={
    digestEnabled:document.getElementById('setDigest').checked,
    digestTime:document.getElementById('setDigestTime').value||'08:00',
    weeklyEnabled:document.getElementById('setWeekly').checked,
    weeklyTime:document.getElementById('setWeeklyTime').value||'18:00',
  };
  try{await apiFetch(API+'/settings',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});closeSettings();toast('Avisos guardados');}
  catch(e){if(e.message!=='401')toast('Error al guardar');}
}
async function testDigest(){
  toast('Enviando…');
  try{const r=await apiFetch(API+'/digest/test',{method:'POST'});if(r.ok)toast('📲 Te lo mandé al WhatsApp');else toast('Error al enviar');}
  catch(e){if(e.message!=='401')toast('Error al enviar');}
}

function initApp(){
  const fab=document.getElementById('fab');if(fab)fab.style.display='flex';
  const gear=document.getElementById('gearBtn');if(gear)gear.style.display='flex';
  const sr=document.getElementById('sinRespBtn');if(sr)sr.style.display='flex';
  const savedV=localStorage.getItem('pai_view');
  if(savedV&&['hoy','todo','agenda','recur','sinresp'].includes(savedV))view=savedV;
  else view='hoy';
  const savedC=localStorage.getItem('pai_company');
  if(savedC&&(savedC==='all'||COMPANY_ORDER.includes(savedC)))companyFilter=savedC;
  buildCompanyPills();
  updateTabActive();
  const showFilters=TASK_VIEWS.includes(view);
  document.getElementById('compPills').style.display=showFilters?'':'none';
  document.querySelector('.toolbar').style.display=(view==='sinresp'||view==='recur')?'none':'';
  startSSE();loadAll();
}

if(TOKEN){initApp();}
